services:
  db:
    image: postgres:17
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_HOST: db

    depends_on:
      - db


    ports:
      - "8000:8000"

volumes:
  postgres_data: